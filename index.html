<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B7 Suplementos — Performance de Elite</title>

  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>

  <div id="top-bar">
    🚚 Frete grátis acima de R$ 299 &nbsp;|&nbsp; Entregamos em todo o Brasil &nbsp;|&nbsp; 📍 Belo Campo, BA
  </div>

  <header id="main-header">
    <div class="header-inner">

      <button class="hamburger" id="hamburger-btn" aria-label="Abrir menu">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <div class="logo" onclick="navigateTo('home')">
        <div class="logo-circle">
          <span class="logo-b7">B7</span>
        </div>

        <div class="logo-text">
          <span class="logo-name">B7</span>
          <span class="logo-sub">SUPLEMENTOS</span>
        </div>
      </div>

      <div class="search-wrapper">
        <input 
          type="text" 
          id="search-input" 
          placeholder="Buscar suplementos, marcas ou categorias..." 
          autocomplete="off"
        >

        <button class="search-btn" id="search-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="11" cy="11" r="8"/>
            <path d="m21 21-4.35-4.35"/>
          </svg>
        </button>

        <div id="search-dropdown" class="search-dropdown hidden"></div>
      </div>

      <nav class="main-nav" id="main-nav">
        <a href="#" onclick="navigateTo('home')">Início</a>
        <a href="#" onclick="navigateTo('products')">Produtos</a>
        <a href="#" onclick="navigateTo('about')">Sobre</a>
        <a href="#" onclick="navigateTo('contact')">Contato</a>
        <a href="#" onclick="navigateTo('faq')">FAQ</a>
      </nav>

      <div class="header-icons">
        <button class="icon-btn" onclick="navigateTo('wishlist')" title="Favoritos">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
          <span class="badge" id="wishlist-badge">0</span>
        </button>

        <button class="icon-btn cart-icon-btn" onclick="openCart()" title="Carrinho">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="9" cy="21" r="1"/>
            <circle cx="20" cy="21" r="1"/>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
          </svg>
          <span class="badge" id="cart-badge">0</span>
        </button>

        <button class="icon-btn" onclick="navigateTo('account')" title="Conta">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </button>
      </div>

    </div>

    <div class="mobile-nav" id="mobile-nav">
      <a href="#" onclick="navigateTo('home'); closeMobileNav()">Início</a>
      <a href="#" onclick="navigateTo('products'); closeMobileNav()">Produtos</a>
      <a href="#" onclick="navigateTo('about'); closeMobileNav()">Sobre</a>
      <a href="#" onclick="navigateTo('contact'); closeMobileNav()">Contato</a>
      <a href="#" onclick="navigateTo('faq'); closeMobileNav()">FAQ</a>
      <a href="#" onclick="navigateTo('wishlist'); closeMobileNav()">Favoritos</a>
      <a href="#" onclick="navigateTo('account'); closeMobileNav()">Minha Conta</a>
    </div>
  </header>

  <main id="app"></main>

  <footer id="main-footer"></footer>

  <div id="cart-overlay" class="cart-overlay hidden" onclick="closeCart()"></div>

  <aside id="cart-sidebar" class="cart-sidebar">
    <div class="cart-header">
      <h3>Seu carrinho</h3>
      <button class="cart-close" onclick="closeCart()">✕</button>
    </div>

    <div id="cart-items" class="cart-items"></div>
    <div id="cart-footer" class="cart-footer"></div>
  </aside>

  <div id="admin-panel" style="display:none"></div>

  <script src="app.js"></script>

</body>
</html>
